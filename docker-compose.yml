services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: researchflow-postgres
    environment:
      POSTGRES_USER: researchflow
      POSTGRES_PASSWORD: researchflow
      POSTGRES_DB: researchflow
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U researchflow -d researchflow"]
      interval: 5s
      timeout: 5s
      retries: 10
